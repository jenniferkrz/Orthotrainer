<script>
    // Fallnummer aus URL-Hash auslesen und Identifier entfernen
    const hash = window.location.hash.substring(1);
    const hashParts = hash.split("-");
    const fall = hashParts[0]; // Nur die Fallnummer, ohne Identifier

    console.log("Hash:", hash);
    console.log("Fallnummer:", fall);

    // Bildpfade erstellen
    let src_opg = "images/opg" + fall + ".jpg";
    let src_frs = "images/frs" + fall + ".png";
    let src_front = "images/ok" + fall + ".png";
    let src_side = "images/uk" + fall + ".png";
    let src_ana1 = "images/ana1.png";
    let src_ana2 = "images/ana2.png";

    console.log("OPG:", src_opg);
    console.log("FRS:", src_frs);
    console.log("OK:", src_front);
    console.log("UK:", src_side);
    console.log("Ana1:", src_ana1);
    console.log("Ana2:", src_ana2);

    // Hauptbild initial setzen (erstes Bild = OPG)
    $('#mainImage').attr("src", src_opg);

    // Thumbnail-Bilder setzen
    $('.thumbnail_item').each(function() {
        const template = $(this).attr('data-image-template');
        let imageSrc = '';

        switch(template) {
            case 'opg':
                imageSrc = src_opg;
                break;
            case 'frs':
                imageSrc = src_frs;
                break;
            case 'front':
                imageSrc = src_front;
                break;
            case 'side':
                imageSrc = src_side;
                break;
            case 'ana1':
                imageSrc = src_ana1;
                break;
            case 'ana2':
                imageSrc = src_ana2;
                break;
        }

        // Setze das Thumbnail-Bild
        $(this).find('.thumbnail_image').attr('src', imageSrc);

        // Setze das data-image Attribut für die Galerie-Funktionalität
        $(this).attr('data-image', imageSrc);
    });

    // Zoom und Drag Funktionalität
    const mainImage = document.getElementById('mainImage');
    const imageContainer = document.getElementById('imageContainer');
    const zoomInBtn = document.getElementById('zoomIn');
    const zoomOutBtn = document.getElementById('zoomOut');
    const zoomLevelDisplay = document.getElementById('zoomLevel');

    let scale = 1;
    let panning = false;
    let pointX = 0;
    let pointY = 0;
    let start = { x: 0, y: 0 };

    // Zoom-Funktion
    function setZoom(newScale) {
        scale = Math.min(Math.max(0.5, newScale), 5);
        mainImage.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`;
        zoomLevelDisplay.textContent = Math.round(scale * 100) + '%';

        if (scale > 1) {
            mainImage.style.cursor = 'grab';
        } else {
            mainImage.style.cursor = 'default';
            pointX = 0;
            pointY = 0;
            mainImage.style.transform = `translate(0px, 0px) scale(${scale})`;
        }
    }

    // Zoom Buttons
    zoomInBtn.addEventListener('click', () => {
        setZoom(scale + 0.25);
    });

    zoomOutBtn.addEventListener('click', () => {
        setZoom(scale - 0.25);
    });

    // Mausrad-Zoom
    imageContainer.addEventListener('wheel', (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? -0.1 : 0.1;
        setZoom(scale + delta);
    });

    // Drag-Funktionalität
    mainImage.addEventListener('mousedown', (e) => {
        if (scale <= 1) return;
        e.preventDefault();
        start = { x: e.clientX - pointX, y: e.clientY - pointY };
        panning = true;
        mainImage.classList.add('dragging');
    });

    document.addEventListener('mousemove', (e) => {
        if (!panning) return;
        e.preventDefault();
        pointX = e.clientX - start.x;
        pointY = e.clientY - start.y;
        mainImage.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`;
    });

    document.addEventListener('mouseup', () => {
        panning = false;
        mainImage.classList.remove('dragging');
    });

    // Bildgalerie-Funktionalität
    const thumbnailItems = document.querySelectorAll('.thumbnail_item');

    thumbnailItems.forEach(item => {
        item.addEventListener('click', function() {
            thumbnailItems.forEach(thumb => thumb.classList.remove('active'));
            this.classList.add('active');

            const imageUrl = this.getAttribute('data-image');
            const caption = this.getAttribute('data-caption');
            mainImage.src = imageUrl;
            mainImage.alt = caption;

            // Reset Zoom
            scale = 1;
            pointX = 0;
            pointY = 0;
            setZoom(1);
        });
    });


</script>

    <style>
        .editor_prof{
            width: 100% !important;
        }
        /* Layout für die "Tabelle" */
        .ml-table {
            display: grid;
            grid-template-columns: 280px 40px 1fr 40px;
            gap: 6px 8px;
            align-items: center;
            margin: 16px 0 12px;
            border: 1px solid #bbb;
            border-radius: 8px;
            padding: 10px;
            background: #fafafa;
            font-family: inherit;
        }

        .ml-row { display: contents; }

        .ml-head {
            grid-column: 1 / -1;
            font-weight: 700;
            text-align: center;
            padding: 4px 0 10px;
        }

        .ml-cell { min-height: 36px; display:flex; align-items:center; }
        .ml-label {
            background: #e9ecef;
            padding: 8px 10px;
            border-radius: 6px;
            font-weight: 600;
        }
        .ml-side { justify-content:center; color:#666; }

        /* Die Skala selbst */
        .ml-scale {
            position: relative;
            height: 34px;
            border-radius: 6px;
            background: linear-gradient(#fff,#fff);
            outline: none;
        }

        /* Grundlinie */
        .ml-scale::before {
            content: "";
            position: absolute;
            left: 2%;
            right: 2%;
            top: 50%;
            height: 2px;
            background: #111;
            transform: translateY(-50%);
            border-radius: 2px;
        }

        /* Mittellinie (punktiert) */
        .ml-scale::after {
            content: "";
            position: absolute;
            left: 50%;
            top: 8px;
            bottom: 8px;
            width: 0;
            border-left: 2px dotted #333;
            transform: translateX(-50%);
            pointer-events: none;
        }

        /* Ticks - normale Größe */
        .ml-tick {
            position: absolute;
            bottom: 6px;
            width: 1px;
            height: 12px;
            background: #222;
            transform: translateX(-0.5px);
            pointer-events: none;
        }

        /* Kleine Ticks für ungerade Werte */
        .ml-tick-small {
            height: 4px;
            bottom: 12px;
        }

        /* Klick-Zonen (unsichtbar, aber groß genug) */
        .ml-hit {
            position: absolute;
            top: 0; bottom: 0;
            width: 24px;
            transform: translateX(-50%);
            background: transparent;
            cursor: pointer;
            border: none;
            outline: none;
        }

        .ml-hit:focus-visible { outline: 2px solid #2684ff; outline-offset: 2px; }

        /* Auswahl-Indikator */
        .ml-indicator {
            position: absolute;
            top: 3px; bottom: 3px;
            width: 12px;
            transform: translateX(-50%);
            background: rgba(38,132,255,.15);
            border: 2px solid #2684ff;
            border-radius: 6px;
            pointer-events: none;
        }

        /* Hoverhilfe: feine Hilfslinie */
        .ml-hit:hover::after {
            content: "";
            position: absolute;
            top: 6px; bottom: 6px;
            left: 50%;
            width: 0;
            border-left: 1px dashed #888;
            transform: translateX(-50%);
        }

        /* Spezielle Markierung für Tick=0 */
        .ml-tick-zero {
            height: 18px;
            background: #000;
            position: relative;
        }

        /* Zahl 0 über der Mittellinie */
        #scale_ok_basal .ml-tick-zero::before {
            content: "0";
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #000;
        }
    </style>
</head>

<script>
    function initMidlineScale(scaleId, inputId, options = {}) {
        const cfg = Object.assign({ min: -8, max: 8, step: 1, initial: null }, options);
        const el = document.getElementById(scaleId);
        const input = document.getElementById(inputId);
        if (!el || !input) return;

        el.setAttribute('role', 'slider');
        el.setAttribute('aria-valuemin', cfg.min);
        el.setAttribute('aria-valuemax', cfg.max);
        el.setAttribute('tabindex', '0');
        el.classList.add('ml-scale');

        const indicator = document.createElement('div');
        indicator.className = 'ml-indicator';
        el.appendChild(indicator);

        const toPercent = (v) => {
            const span = cfg.max - cfg.min;
            return ((v - cfg.min) / span) * 96 + 2;
        };

        const values = [];
        for (let v = cfg.min; v <= cfg.max; v += cfg.step) values.push(v);

        values.forEach(v => {
            const pct = toPercent(v);

            const tick = document.createElement('div');
            tick.className = 'ml-tick';

            // Kleine Striche für ungerade Werte (außer 0)
            if (v !== 0 && v % 2 !== 0) {
                tick.classList.add('ml-tick-small');
            }

            tick.style.left = pct + '%';
            if (v === 0) tick.classList.add('ml-tick-zero');
            el.appendChild(tick);

            const hit = document.createElement('button');
            hit.type = 'button';
            hit.className = 'ml-hit';
            hit.style.left = pct + '%';
            hit.dataset.value = v;
            hit.setAttribute('aria-label', `Abweichung ${v}`);
            hit.addEventListener('click', () => setValue(v));
            el.appendChild(hit);
        });

        function setValue(v, emit = true) {
            const pct = toPercent(v);
            indicator.style.left = pct + '%';
            input.value = String(v);
            el.setAttribute('aria-valuenow', v);
            el.setAttribute('aria-valuetext', `${v}`);
            if (emit) {
                input.dispatchEvent(new Event('change', { bubbles: true }));
            }
        }

        el.addEventListener('keydown', (e) => {
            const current = Number(input.value || 0);
            if (e.key === 'ArrowLeft')  { e.preventDefault(); setValue(Math.max(cfg.min, current - cfg.step)); }
            if (e.key === 'ArrowRight') { e.preventDefault(); setValue(Math.min(cfg.max, current + cfg.step)); }
            if (e.key === 'Home')       { e.preventDefault(); setValue(cfg.min); }
            if (e.key === 'End')        { e.preventDefault(); setValue(cfg.max); }
            if (e.key === '0' || e.key === 'Insert') { setValue(0); }
        });

        if (input.value !== '') {
            setValue(Number(input.value), false);
        } else if (cfg.initial != null) {
            setValue(cfg.initial, false);
        } else {
            setValue(0, false);
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        initMidlineScale('scale_ok_basal',   'midline_ok_basal',   { min:-10, max:10, step:1, initial:null });
        initMidlineScale('scale_ok_dental',  'midline_ok_dental',  { min:-10, max:10, step:1, initial:null });
        initMidlineScale('scale_uk_dental',  'midline_uk_dental',  { min:-10, max:10, step:1, initial:0 });
        initMidlineScale('scale_uk_basal',   'midline_uk_basal',   { min:-10, max:10, step:1, initial:null });
    });

    function resizeIframe(obj) {
        obj.style.height = obj.contentWindow.document.documentElement.scrollHeight + 'px';
    }
</script>

    <style>
        .delete-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            padding: 10px 20px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease, background 0.2s ease;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .delete-btn.active {
            opacity: 1;
            pointer-events: auto;
        }

        .delete-btn:hover {
            background: #cc0000;
        }

        .delete-btn:active {
            transform: scale(0.98);
        }

        /* ==========================================
           Kalibrierungs-Status Anzeige
           ========================================== */
        .calibration-info {
            display: none;
            margin-top: 10px;
            padding: 8px 12px;
            background: rgba(0, 255, 0, 0.1);
            border-left: 3px solid #00ff00;
            border-radius: 4px;
            font-size: 11px;
            color: #aaa;
        }

        .calibration-info.not-calibrated {
            background: rgba(255, 153, 0, 0.1);
            border-left-color: #ff9900;
            color: #ff9900;
        }

        .calibration-info i {
            margin-right: 5px;
        }
        /* Winkel-Optionen */
        .winkel_options {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 12px;
            color: #aaa;
        }

        .winkel_options.visible {
            display: flex;
            justify-content: end;
        }

        .toggle_label {
            user-select: none;
            cursor: pointer;
        }

        /* Toggle Switch Style */
        .toggle_switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 22px;
            flex-shrink: 0;
        }

        .toggle_switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle_slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #444;
            transition: 0.3s;
            border-radius: 22px;
        }

        .toggle_slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        .toggle_switch input:checked + .toggle_slider {
            background-color: #ff5555;
        }

        .toggle_switch input:checked + .toggle_slider:before {
            transform: translateX(18px);
        }

        @media (pointer: coarse) {
            .delete-btn {
                padding: 12px 24px;
                font-size: 15px;
            }
        }
    </style>
</head>
